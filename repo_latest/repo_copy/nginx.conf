# ─── Paradigm Absolute — Nginx Reverse Proxy ───────────────────────────────
# Handles: compression, caching static assets, proxying API & WebSocket,
# security headers, rate limiting at the edge.
# ────────────────────────────────────────────────────────────────────────────

upstream paradigm_app {
    server app:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Phase 0 / G-03: removed 'unsafe-eval' from script-src. Vite production
    # bundles are static ESM — they do not need eval. If a dev server config
    # is later introduced, scope 'unsafe-eval' there behind a nonce, not here.
    # 'unsafe-inline' on script-src is retained only until a nonce-based CSP
    # lands in Phase 1; tracked by Decision D-6.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:;" always;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # ── Health check (no rate limit) ───────────────────────────────────────
    location = /health {
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
    }

    # ── Prometheus metrics (internal only — restrict in production) ────────
    location = /metrics {
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
        # In production, restrict to internal network:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # ── Auth endpoints (strict rate limit) ─────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket (for future agent streaming) ─────────────────────────────
    location /ws {
        proxy_pass http://paradigm_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Static assets (long cache) ─────────────────────────────────────────
    location /assets/ {
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Everything else (SPA fallback) ─────────────────────────────────────
    location / {
        proxy_pass http://paradigm_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
