# Paradigm GSPL Agent — Axolotl QLoRA Training Config
# Train with: accelerate launch -m axolotl.cli.train llm-inference/train_config.yml
# Requires: 1x A100 40GB or 2x RTX 3090/4090

base_model: unsloth/llama-3-8b-bnb-4bit
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

load_in_8bit: false
load_in_4bit: true
strict: false

datasets:
  - path: ./data/training/gspl_conversations.jsonl
    type: sharegpt
    conversation: conversations

dataset_prepared_path: ./data/training/prepared
val_set_size: 0.05
output_dir: ./llm-inference/gspl-agent-lora

# Sequence config
sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

# LoRA config
adapter: qlora
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_target_linear: true

# Training
train_on_inputs: false
group_by_length: false
bf16: auto
fp16: false
tf32: true

gradient_accumulation_steps: 4
micro_batch_size: 2
num_epochs: 3
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 2e-4
weight_decay: 0.01
max_grad_norm: 1.0

logging_steps: 10
eval_steps: 100
save_steps: 500
save_total_limit: 3
warmup_steps: 100

flash_attention: true

# Special tokens
special_tokens:
  pad_token: "<|end_of_text|>"
